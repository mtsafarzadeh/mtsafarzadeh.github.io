# -----------------------------------------------------------------------------
# Site settings
# -----------------------------------------------------------------------------

title: Mohammad Safarzadeh
first_name: Mohammad
middle_name: Taher
last_name: Safarzadeh
email: mtsafarzadeh@gmail.com
description: >
  Applied Scientist and Astrophysicist working at the intersection
  of generative AI and physics. Former postdoctoral researcher at
  Harvard University. PhD from Johns Hopkins University.
footer_text: >
  Powered by <a href="https://jekyllrb.com/" target="_blank">Jekyll</a>
  with <a href="https://github.com/alshedivat/al-folio">al-folio</a> theme.

icon: ⭐️  # emoji as favicon

url: https://mtsafarzadeh.github.io  # change to your github username
baseurl:  # leave empty
last_updated: true
impressum_path:  # set to path to include impressum link in footer

# -----------------------------------------------------------------------------
# Theme
# -----------------------------------------------------------------------------

repo_theme_light: default
repo_theme_dark: dark
repo_trophies:
  enabled: true
  theme_light: flat
  theme_dark: gitdimmed

# -----------------------------------------------------------------------------
# RSS Feed
# -----------------------------------------------------------------------------

rss_icon: true

# -----------------------------------------------------------------------------
# Layout
# -----------------------------------------------------------------------------

navbar_fixed: true
footer_fixed: false
search_enabled: true
search:
  highlight: true

# Allows to open any external links in new tab
bib_search:
  enabled: true

# -----------------------------------------------------------------------------
# Open Graph & Schema.org
# -----------------------------------------------------------------------------

og_image:  # add path to your photo if desired e.g. /assets/img/prof_pic.jpg

# -----------------------------------------------------------------------------
# Social integration
# -----------------------------------------------------------------------------

github_username: mtsafarzadeh  # update with your GitHub username
linkedin_username:              # add if you have one
scholar_userid: 4yTtlesAAAAJ   # from your Google Scholar URL
orcid_id:                       # add if you have one
medium_username: mtsafarzadeh
arxiv_id: mohammadtaher+safarzadeh  # for arXiv search link

contact_note: >
  Feel free to reach out via email for research collaborations
  or discussions on AI and astrophysics.

# -----------------------------------------------------------------------------
# Analytics and search engine verification
# -----------------------------------------------------------------------------

google_analytics:  # add your GA tracking ID if desired
cronitor_analytics:
pirsch_analytics:

# -----------------------------------------------------------------------------
# Blog
# -----------------------------------------------------------------------------

blog_name: AI Thoughts
blog_description: Posts on generative AI and its intersection with physics
permalink: /blog/:year/:title/
lsi: false

paginate: 5
paginate_path: /blog/page:num/

# -----------------------------------------------------------------------------
# Collections
# -----------------------------------------------------------------------------

collections:
  news:
    defaults:
      layout: post
    output: true
    permalink: /news/:path/
  projects:
    output: true
    permalink: /projects/:path/

announcements:
  enabled: true
  scrollable: true
  limit: 5

latest_posts:
  enabled: true
  scrollable: true
  limit: 3

# -----------------------------------------------------------------------------
# Jekyll settings
# -----------------------------------------------------------------------------

markdown: kramdown
highlighter: rouge
highlight_theme_light: github
highlight_theme_dark: native
kramdown:
  input: GFM
  syntax_highlighter_opts:
    css_class: "highlight"
    span:
      line_numbers: false
    block:
      line_numbers: false
      start_line: 1

include: ["_pages"]
exclude:
  - bin/
  - CONTRIBUTING.md
  - CUSTOMIZE.md
  - Dockerfile
  - docker-compose.yml
  - docker-compose-slim.yml
  - FAQ.md
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - package.json
  - package-lock.json
  - README.md
  - readme_preview/
  - vendor

keep_files:
  - CNAME
  - .nojekyll
  - .git

plugins:
  - jekyll-archives
  - jekyll-email-protect
  - jekyll-feed
  - jekyll-get-json
  - jekyll-imagemagick
  - jekyll-jupyter-notebook
  - jekyll-link-attributes
  - jekyll-minifier
  - jekyll-paginate
  - jekyll-regex-replace
  - jekyll-scholar
  - jekyll-sitemap
  - jekyll-toc
  - jekyll-twitter-plugin
  - jemoji

# -----------------------------------------------------------------------------
# Jekyll Scholar
# -----------------------------------------------------------------------------

scholar:
  last_name: [Safarzadeh]
  first_name: [Mohammad, M., Mohammad Taher, M.T.]

  style: apa
  locale: en

  source: /_bibliography/
  bibliography: papers.bib
  bibliography_template: bib

  replace_strings: true
  join_strings: true

  details_dir: bibliography
  details_layout: bibtex.html
  details_link: Details

  query: "@*"
  group_by: year
  group_order: descending
